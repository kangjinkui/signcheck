version: '3.8'

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: adjudge-postgres
    environment:
      POSTGRES_DB: adjudge
      POSTGRES_USER: adjudge
      POSTGRES_PASSWORD: adjudge
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adjudge"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: adjudge-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://adjudge:adjudge@postgres:5432/adjudge
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: adjudge-frontend
    environment:
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
